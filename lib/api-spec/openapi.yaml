openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Suspicious Activity Detection System
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: detections
    description: Detection operations
  - name: stats
    description: Statistics and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current logged in user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /detections:
    get:
      operationId: listDetections
      tags: [detections]
      summary: List all detections
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
        - name: activityType
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of detections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Detection"

    post:
      operationId: createDetection
      tags: [detections]
      summary: Submit a detection analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDetectionBody"
      responses:
        "201":
          description: Detection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Detection"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /detections/{id}:
    get:
      operationId: getDetection
      tags: [detections]
      summary: Get a detection by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Detection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Detection"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteDetection
      tags: [detections]
      summary: Delete a detection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get overall detection statistics
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/activity-breakdown:
    get:
      operationId: getActivityBreakdown
      tags: [stats]
      summary: Get breakdown of detections by activity type
      responses:
        "200":
          description: Activity breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityBreakdownItem"

  /stats/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent detection activity feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Detection"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    RegisterBody:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        fullName:
          type: string
      required:
        - username
        - email
        - password

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        fullName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - username
        - email
        - createdAt

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user
        - message

    BoundingBox:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        label:
          type: string
        confidence:
          type: number
      required:
        - x
        - y
        - width
        - height
        - label
        - confidence

    Detection:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        inputType:
          type: string
        inputUrl:
          type: ["string", "null"]
        inputFilename:
          type: ["string", "null"]
        activityType:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        status:
          type: string
        boundingBoxes:
          type: ["string", "null"]
        processedImageUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - inputType
        - status
        - createdAt
        - updatedAt

    CreateDetectionBody:
      type: object
      properties:
        userId:
          type: ["integer", "null"]
        inputType:
          type: string
        inputUrl:
          type: ["string", "null"]
        inputFilename:
          type: ["string", "null"]
        activityType:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        status:
          type: string
        boundingBoxes:
          type: ["string", "null"]
        processedImageUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - inputType
        - status

    StatsSummary:
      type: object
      properties:
        totalDetections:
          type: integer
        suspiciousCount:
          type: integer
        normalCount:
          type: integer
        pendingCount:
          type: integer
        avgConfidence:
          type: number
      required:
        - totalDetections
        - suspiciousCount
        - normalCount
        - pendingCount
        - avgConfidence

    ActivityBreakdownItem:
      type: object
      properties:
        activityType:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required:
        - activityType
        - count
        - percentage
